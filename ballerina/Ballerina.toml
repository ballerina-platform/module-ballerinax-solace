[package]
org = "xlibb"
name = "solace"
version = "0.3.1"
authors = ["Ballerina"]
keywords = ["service", "client", "messaging", "network", "pubsub"]
repository = "https://github.com/xlibb/module-solace"
icon = "icon.png"
license = ["Apache-2.0"]
distribution = "2201.12.0"

[platform.java21]
graalvmCompatible = false

[build-options]
observabilityIncluded=true

[[platform.java21.dependency]]
groupId = "io.xlibb"
artifactId = "solace-native"
version = "0.4.0"
path = "../native/build/libs/solace-native-0.4.0.jar"

[[platform.java21.dependency]]
groupId = "com.solacesystems"
artifactId = "sol-jcsmp"
version = "10.28.3"
path = "./lib/sol-jcsmp-10.28.3.jar"

